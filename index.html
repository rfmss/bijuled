<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="bijuled">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#9b8fc4">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="icon-lavender.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-lavender.png">
  <script>(function(){var P=[{n:'terra',h:'#cd7b5f'},{n:'olive',h:'#6e7a4e'},{n:'rose',h:'#c4708a'},{n:'lavender',h:'#9b8fc4'},{n:'blue',h:'#6b9ab8'},{n:'sage',h:'#8fb3ae'}];var c=P[Math.floor(Math.random()*P.length)];var q=document.querySelector.bind(document);var e;e=q('meta[name="theme-color"]');if(e)e.setAttribute('content',c.h);e=q('link[rel="apple-touch-icon-precomposed"]');if(e)e.setAttribute('href','icon-'+c.n+'.png');e=q('link[rel="apple-touch-icon"]');if(e)e.setAttribute('href','icon-'+c.n+'.png');window._pal=c;})();</script>
  <title>Bijuled</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══════════════════════════ MENU SCREEN ═══════════════════════════ -->
  <div id="screen-menu" class="screen active">
    <div class="menu-bg">
      <div class="bg-gems-float" id="bg-gems"></div>
    </div>
    <div class="menu-content">
      <div class="logo-block">
        <div class="logo-icon">
          <svg viewBox="0 0 80 80" width="80" height="80">
            <defs>
              <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#ffd700"/>
                <stop offset="60%" stop-color="#d4a017"/>
                <stop offset="100%" stop-color="#8b6914"/>
              </linearGradient>
              <filter id="logo-glow">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <polygon points="40,4 74,32 40,76 6,32" fill="url(#logo-grad)" filter="url(#logo-glow)"/>
            <polygon points="40,12 66,34 40,62 14,34" fill="rgba(255,255,255,0.15)"/>
            <polygon points="40,4 58,24 40,32 22,24" fill="rgba(255,255,255,0.35)"/>
            <ellipse cx="30" cy="18" rx="6" ry="4" fill="rgba(255,255,255,0.6)" transform="rotate(-20,30,18)"/>
          </svg>
        </div>
        <h1 class="logo-title">BIJULED</h1>
        <p class="logo-sub">Combine. Cascade. Conquer.</p>
      </div>

      <div class="menu-buttons">
        <button class="btn-primary btn-xl" id="btn-play">
          <span class="btn-icon-wrap">
            <img src="assets/icons/play-circle.svg" width="22" height="22" alt="">
          </span>
          Jogar
        </button>
        <button class="btn-secondary" id="btn-levels">
          <span class="btn-icon-wrap">
            <img src="assets/icons/list-numbers.svg" width="18" height="18" alt="">
          </span>
          Selecionar Fase
        </button>
      </div>

      <div class="menu-footer">
        <span class="version-tag">v1.0 · 50 Fases</span>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════ LEVEL SELECT ═══════════════════════════ -->
  <div id="screen-levels" class="screen">
    <div class="screen-header-bar">
      <button class="btn-back" id="btn-back-menu">
        <img src="assets/icons/arrow-left.svg" width="22" height="22" alt="Voltar">
      </button>
      <h2 class="screen-title">Fases</h2>
      <div class="header-spacer"></div>
    </div>
    <div class="chapter-scroll">
      <div id="levels-container"></div>
    </div>
  </div>

  <!-- ═══════════════════════════ GAME SCREEN ═══════════════════════════ -->
  <div id="screen-game" class="screen">
    <div class="game-wrapper">

      <!-- Top HUD -->
      <div class="game-hud">
        <button class="hud-btn" id="btn-pause">
          <img src="assets/icons/pause.svg" width="20" height="20" alt="Pausa">
        </button>

        <div class="hud-stats">
          <div class="hud-stat">
            <span class="hud-label">FASE</span>
            <span class="hud-value" id="hud-level">1</span>
          </div>
          <div class="hud-stat hud-score-stat">
            <span class="hud-label">PONTOS</span>
            <span class="hud-value gold" id="hud-score">0</span>
          </div>
          <div class="hud-stat">
            <span class="hud-label">JOGADAS</span>
            <span class="hud-value" id="hud-moves">—</span>
          </div>
        </div>

        <div class="hud-lives" id="hud-lives">
          <span class="life-heart active">♥</span>
          <span class="life-heart active">♥</span>
          <span class="life-heart active">♥</span>
        </div>
      </div>

      <!-- Objective -->
      <div class="objective-strip">
        <div class="obj-text" id="obj-text">Alcance 500 pontos</div>
        <div class="obj-progress-wrap">
          <div class="obj-progress-bar">
            <div class="obj-progress-fill" id="obj-fill" style="width:0%"></div>
          </div>
          <span class="obj-percent" id="obj-percent">0%</span>
        </div>
      </div>

      <!-- Board Container -->
      <div class="board-container">
        <div class="board-frame">
          <div class="game-board" id="game-board"></div>
          <canvas id="particle-canvas"></canvas>
        </div>
      </div>

      <!-- Boosts Bar -->
      <div class="boosts-bar">
        <button class="boost-btn" id="boost-hammer" data-type="hammer">
          <span class="boost-emoji">🔨</span>
          <span class="boost-label">Remover</span>
          <span class="boost-count" id="boost-count-hammer">3</span>
        </button>
        <button class="boost-btn" id="boost-shuffle" data-type="shuffle">
          <span class="boost-emoji">🔀</span>
          <span class="boost-label">Misturar</span>
          <span class="boost-count" id="boost-count-shuffle">2</span>
        </button>
        <button class="boost-btn" id="boost-bomb" data-type="bomb">
          <span class="boost-emoji">💥</span>
          <span class="boost-label">Bomba</span>
          <span class="boost-count" id="boost-count-bomb">1</span>
        </button>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════ OVERLAYS ═══════════════════════════ -->

  <!-- Pause -->
  <div id="overlay-pause" class="overlay hidden">
    <div class="overlay-backdrop"></div>
    <div class="overlay-card">
      <div class="overlay-icon">
        <img src="assets/icons/pause-circle.svg" width="48" height="48" alt="">
      </div>
      <h2 class="overlay-title">Pausado</h2>
      <div class="overlay-actions">
        <button class="btn-primary" id="btn-resume">Continuar</button>
        <button class="btn-ghost" id="btn-restart">Reiniciar Fase</button>
        <button class="btn-ghost" id="btn-quit">Ir ao Menu</button>
      </div>
    </div>
  </div>

  <!-- Level Complete -->
  <div id="overlay-complete" class="overlay hidden">
    <div class="overlay-backdrop"></div>
    <div class="overlay-card success">
      <div class="stars-row" id="stars-row">
        <span class="star" id="star-1">★</span>
        <span class="star" id="star-2">★</span>
        <span class="star" id="star-3">★</span>
      </div>
      <h2 class="overlay-title">Fase Concluída!</h2>
      <div class="complete-score">
        <span class="complete-score-label">Pontuação</span>
        <span class="complete-score-value" id="complete-score">0</span>
      </div>
      <div class="overlay-actions">
        <button class="btn-primary" id="btn-next-level">Próxima Fase</button>
        <button class="btn-ghost" id="btn-replay">Repetir</button>
      </div>
    </div>
  </div>

  <!-- Game Over -->
  <div id="overlay-gameover" class="overlay hidden">
    <div class="overlay-backdrop"></div>
    <div class="overlay-card danger">
      <div class="overlay-icon pulse-red">
        <img src="assets/icons/x-circle.svg" width="48" height="48" alt="">
      </div>
      <h2 class="overlay-title">Fim de Jogo</h2>
      <p class="overlay-sub" id="gameover-msg">Sem movimentos disponíveis</p>
      <div class="overlay-actions">
        <button class="btn-primary" id="btn-try-again">Tentar Novamente</button>
        <button class="btn-ghost" id="btn-goto-menu">Ir ao Menu</button>
      </div>
    </div>
  </div>

  <!-- Combo Popup -->
  <div id="combo-popup" class="combo-popup hidden">
    <span id="combo-text">COMBO x2!</span>
  </div>

  <script src="js/gems.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/board.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
